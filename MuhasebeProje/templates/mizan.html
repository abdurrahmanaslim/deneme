<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hesap Durumu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 40px;
        }

        .mizan-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #00ff53;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .table thead {
            background-color: #14a5a1;
            color: white;
        }
    </style>
</head>
<body>
    <div class="mizan-container">
        <h2 class="text-center">📊 Güncel Mizan</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Kod</th>
                    <th>Hesap Adı</th>
                    <th class="text-end">Bakiye</th>
                </tr>
            </thead>
            <tbody>
                {% for kod, bilgi in hesaplar.items() %}
                <tr>
                    <td><b>{{ kod }}</b></td>
                    <td>{{ bilgi.name }}</td>
                    <td class="text-end">{{ "{:,.2f}".format(bilgi.balance) }} TL</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="text-center mt-4">
            <a href="/" class="btn btn-secondary">⬅ Geri Dön</a>
        </div>
    </div>
</body>
</html>
