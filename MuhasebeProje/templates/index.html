<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AI Destekli Muhasebe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 20px;
        }

        .btn-ai {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            border: none;
            color: white;
        }

        .btn-ocr {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            border: none;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1>AI Destekli Muhasebe ✨</h1>
            <p class="text-info">Siz yükleyin biz analiz edelim.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card">
                    <h5>Metin ile İşlem Gir</h5>
                    <form action="/ai-add" method="post">
                        <input type="text" name="text" class="form-control mb-3" placeholder="Örn: 250 TL yemek faturası ödedim">
                        <button class="btn btn-ai w-100" type="submit">AI Analiz Et ve Kaydet</button>
                    </form>
                </div>

                <div class="glass-card">
                    <h5>Fiş Fotoğrafı Yükle</h5>
                    <form action="/upload" method="post" enctype="multipart/form-data">
                        <input type="file" name="file" class="form-control mb-3" accept="image/*">
                        <button class="btn btn-ocr w-100" type="submit">Fişi Tara</button>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <a href="/balance-sheet" class="btn btn-outline-light">📊 Güncel Mizanı Gör</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
